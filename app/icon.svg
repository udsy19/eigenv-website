<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#1e2edc"/>
  <!-- EIGENV mark: a bold monospace E in paper -->
  <rect x="9"  y="8"  width="4"  height="16" fill="#efedea"/>
  <rect x="9"  y="8"  width="14" height="4"  fill="#efedea"/>
  <rect x="9"  y="14" width="11" height="4"  fill="#efedea"/>
  <rect x="9"  y="20" width="14" height="4"  fill="#efedea"/>
  <!-- a single hot pixel, echoing the field -->
  <rect x="25" y="25" width="3" height="3" fill="#e0492a"/>
</svg>
